<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #4f46e5;
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .avatar {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .chat-header h1 { font-size: 1.1rem; font-weight: 600; }
        .chat-header p { font-size: 0.8rem; opacity: 0.8; }

        .badge {
            margin-left: auto;
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            max-width: 80%;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.bot  { align-self: flex-start; }

        .message .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .message.user .bubble {
            background: #4f46e5;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .bubble {
            background: #f3f4f6;
            color: #1f2937;
            border-bottom-left-radius: 4px;
        }

        .message .icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user .icon { background: #e0e7ff; }
        .message.bot  .icon { background: #dbeafe; }

        .chat-input {
            padding: 16px 20px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 24px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input input:focus { border-color: #4f46e5; }

        .chat-input button {
            padding: 10px 20px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-input button:hover  { background: #4338ca; }
        .chat-input button:active { background: #3730a3; }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 10px 14px;
            background: #f3f4f6;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px; height: 8px;
            background: #9ca3af;
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30%            { transform: translateY(-6px); }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">🤖</div>
        <div>
            <h1>{{ title }}</h1>
            <p>{{ subtitle }}</p>
        </div>
        <span class="badge">{{ badge }}</span>
    </div>

    <div class="chat-messages" id="messages">
        <div class="message bot">
            <div class="icon">🤖</div>
            <div class="bubble">{{ greeting }}</div>
        </div>
    </div>

    <div class="typing-indicator" id="typing">
        <span></span><span></span><span></span>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type a message..." autofocus />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('userInput');
    const typing = document.getElementById('typing');

    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') sendMessage();
    });

    function addMessage(text, role) {
        const msg = document.createElement('div');
        msg.className = `message ${role}`;
        msg.innerHTML = `
            <div class="icon">${role === 'user' ? '👤' : '🤖'}</div>
            <div class="bubble">${text}</div>
        `;
        messagesDiv.appendChild(msg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';

        // Show typing indicator
        typing.style.display = 'block';
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            typing.style.display = 'none';
            addMessage(data.response, 'bot');
        } catch (err) {
            typing.style.display = 'none';
            addMessage('Sorry, something went wrong.', 'bot');
        }
    }
</script>
</body>
</html>
